{% extends "base.html" %}
{% load static %}

{% block title %}E-Library Check-Out{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning text-dark">
                    <h3 class="card-title mb-0">
                        <i class="fas fa-sign-out-alt"></i> E-Library Check-Out
                    </h3>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">
                        Please enter your registration number to complete your E-Library session.
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <div class="form-group">
                            <label for="registration_number" class="form-label">Registration Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-lg" id="registration_number"
                                   name="registration_number" required placeholder="Enter your registration number">
                        </div>

                        <div class="form-group">
                            <label for="items_taken_out" class="form-label">Items Taken Out</label>
                            <textarea class="form-control" id="items_taken_out" name="items_taken_out" rows="3"
                                      placeholder="List any items you're taking out (books, notes, etc.)"></textarea>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-warning btn-lg">
                                <i class="fas fa-check"></i> Check Out
                            </button>
                            <a href="{% url 'catalog:elibrary_dashboard' %}" class="btn btn-secondary btn-lg ml-2">
                                <i class="fas fa-arrow-left"></i> Back to Dashboard
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Focus on registration number field
document.getElementById('registration_number').focus();
</script>
{% endblock %}
