{% extends 'base.html' %} {% block content %}
<div class="container section__padding">
  <h1>Delete Event</h1>
  <p>Are you sure you want to delete "{{ event.title }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'core:event_detail' event.pk %}" class="btn btn-secondary"
      >Cancel</a
    >
  </form>
</div>
{% endblock %}
